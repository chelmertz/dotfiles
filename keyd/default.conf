# keyd — kernel-level key remapping (https://github.com/rvaiya/keyd).
# Replaces the old X11-level Caps remap (xcape + setxkbmap caps:ctrl_modifier),
# so the remap happens BELOW evdev and keylog captures the real Esc/Ctrl.
#
# Install + enable: see ansible-laptop.yml.
# Deploy this file:  sudo cp keyd/default.conf /etc/keyd/default.conf && sudo keyd reload
# Verify live:       sudo keyd monitor      (shows the remapped output stream)
#
# NOTE: keyd remaps at keycode level, before xkb. The Swedish layout still comes
# from `setxkbmap -layout se` in .i3/config — keep that; only the caps:ctrl_modifier
# OPTION and the xcape line get removed once keyd is confirmed working.

[ids]
*

[main]
# tap = Escape, hold = Control — mirrors `xcape -e Caps_Lock=Escape -t 199`
# plus `caps:ctrl_modifier`, in one line.
capslock = overload(control, esc)
