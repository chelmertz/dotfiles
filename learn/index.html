<script>
/*
 * ============================================================================
 * Quiz data schema (see <script type="application/json" id="quiz-data"> above):
 *
 *   { quizzes: [Quiz, ...] }
 *
 *   Quiz     = { id, title, description?, links?: [{title,url}], segments: [Segment,...] }
 *   Segment  = { id, title, questions: [Question,...] }
 *
 *   Question is one of:
 *
 *     Single  { id, type:'single', prompt, hint?, options:[Option,...] }   // exactly one correct
 *     Multi   { id, type:'multi',  prompt, hint?, options:[Option,...] }   // one or more correct
 *     Map     { id, type:'map',    prompt, hint?,
 *               targets:[{id,label},...],
 *               items:  [{id,label, target:<target-id>, explain}, ...] }
 *     Order   { id, type:'order',  prompt, hint?,
 *               steps:  [{id,label,explain}, ...] }   // array order IS the correct order
 *
 *   Option = { id, text, correct: bool, explain: string }
 *
 * Renderer/engine below is data-agnostic — add a quiz to the JSON and it shows up.
 * Option order (single/multi) and palette order (map/order) are shuffled at render
 * time; cached per session so mid-answer it doesn't reshuffle. Try-again reshuffles.
 * ============================================================================
 */

(() => {
  'use strict';

  const DATA = JSON.parse(document.getElementById('quiz-data').textContent);

  // ---- persisted state ---------------------------------------------------
  const STORAGE_KEY = 'quizzes-state-v2';

  function emptyState() { return { theme: 'auto', quizzes: {} }; }
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return emptyState();
      return { ...emptyState(), ...JSON.parse(raw) };
    } catch { return emptyState(); }
  }
  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function quizState(quizId) {
    if (!state.quizzes[quizId]) state.quizzes[quizId] = { segIdx: 0, qIdx: 0, answers: {}, showSummary: false };
    return state.quizzes[quizId];
  }
  const state = loadState();

  // ---- queries -----------------------------------------------------------
  function quizById(id) { return DATA.quizzes.find(q => q.id === id); }
  function totalQuestions(quiz) { return quiz.segments.reduce((n, s) => n + s.questions.length, 0); }
  function firstCorrectCount(quiz) {
    const qs = quizState(quiz.id);
    return Object.values(qs.answers).filter(a => a.firstCorrect).length;
  }
  function answeredCount(quiz) {
    const qs = quizState(quiz.id);
    return Object.values(qs.answers).filter(a => a.submitted).length;
  }
  function segmentFirstCorrect(quiz, seg) {
    const qs = quizState(quiz.id);
    let n = 0;
    for (const q of seg.questions) if (qs.answers[q.id]?.firstCorrect) n++;
    return n;
  }
  function missedQuestions(quiz) {
    const qs = quizState(quiz.id);
    const out = [];
    quiz.segments.forEach((seg, si) => seg.questions.forEach((q, qi) => {
      const a = qs.answers[q.id];
      if (a && a.submitted && !a.firstCorrect) out.push({ q, seg, segIdx: si, qIdx: qi });
    }));
    return out;
  }
  function posToGlobal(quiz, segIdx, qIdx) {
    let idx = 0;
    for (let i = 0; i < segIdx; i++) idx += quiz.segments[i].questions.length;
    return idx + qIdx;
  }
  function globalToPos(quiz, g) {
    let r = g;
    for (let i = 0; i < quiz.segments.length; i++) {
      const len = quiz.segments[i].questions.length;
      if (r < len) return { segIdx: i, qIdx: r };
      r -= len;
    }
    const last = quiz.segments.length - 1;
    return { segIdx: last, qIdx: quiz.segments[last].questions.length - 1 };
  }

  // ---- routing -----------------------------------------------------------
  function currentRoute() {
    const h = (location.hash || '').replace(/^#\/?/, '');
    if (!h) return { kind: 'home' };
    const [qid, sub] = h.split('/');
    const quiz = quizById(qid);
    if (!quiz) return { kind: 'home' };
    if (sub === 'glossary' && quiz.glossary?.length) return { kind: 'glossary', quiz };
    return { kind: 'quiz', quiz };
  }
  function goHome() { location.hash = ''; }

  // ---- shuffle + per-session render cache --------------------------------
  const renderCache = {};
  function shuffle(arr) {
    const out = arr.slice();
    for (let i = out.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  }
  function getOptionOrder(q) {
    if (!renderCache[q.id]?.optionOrder) {
      renderCache[q.id] = { ...(renderCache[q.id] ?? {}), optionOrder: shuffle(q.options.map(o => o.id)) };
    }
    return renderCache[q.id].optionOrder;
  }
  function getPaletteOrder(q, ids) {
    if (!renderCache[q.id]?.paletteOrder) {
      let order = shuffle(ids);
      if (ids.length > 1 && order.every((id, i) => id === ids[i])) {
        [order[0], order[1]] = [order[1], order[0]];
      }
      renderCache[q.id] = { ...(renderCache[q.id] ?? {}), paletteOrder: order };
    }
    return renderCache[q.id].paletteOrder;
  }
  function clearRenderCache(qid) { delete renderCache[qid]; }

  // ---- theme -------------------------------------------------------------
  const THEMES = ['auto', 'light', 'dark'];
  function applyTheme() {
    const t = state.theme ?? 'auto';
    if (t === 'auto') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', t);
  }
  function cycleTheme() {
    const i = THEMES.indexOf(state.theme ?? 'auto');
    state.theme = THEMES[(i + 1) % THEMES.length];
    saveState();
    applyTheme();
    renderHeader();
  }

  // ---- html helpers ------------------------------------------------------
  function esc(s) {
    return String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
  }
  // Like esc, but turns `…` spans into <code>…</code>. Use for user-authored
  // content (prompts, options, explains, labels) where backticks mean code.
  function fmt(s) {
    return esc(s).replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  // ---- top-level ---------------------------------------------------------
  const headerEl = document.getElementById('header');
  const appEl = document.getElementById('app');

  function render() {
    applyTheme();
    renderHeader();
    appEl.innerHTML = '';
    const route = currentRoute();
    if (route.kind === 'home') renderHome();
    else if (route.kind === 'glossary') renderGlossary(route.quiz);
    else renderQuiz(route.quiz);
  }

  function renderHeader() {
    const route = currentRoute();
    let breadcrumb;
    if (route.kind === 'home') {
      breadcrumb = '<span class="bc current">Quizzes</span>';
    } else if (route.kind === 'glossary') {
      breadcrumb = `<a class="bc" href="#">Quizzes</a><span class="bc sep">/</span><a class="bc" href="#${esc(route.quiz.id)}">${fmt(route.quiz.title)}</a><span class="bc sep">/</span><span class="bc current">Glossary</span>`;
    } else {
      breadcrumb = `<a class="bc" href="#">Quizzes</a><span class="bc sep">/</span><span class="bc current">${fmt(route.quiz.title)}</span>`;
    }
    headerEl.innerHTML = `
      <div class="breadcrumb">${breadcrumb}</div>
      <div class="header-actions">
        <button id="theme-btn" class="secondary">Theme: ${esc(state.theme ?? 'auto')}</button>
      </div>
    `;
    document.getElementById('theme-btn').onclick = cycleTheme;
  }

  // ---- home --------------------------------------------------------------
  function renderHome() {
    const wrap = document.createElement('div');
    wrap.className = 'home';
    wrap.innerHTML = '<h2>Pick a quiz</h2>';

    const list = document.createElement('div');
    list.className = 'quiz-list';
    for (const quiz of DATA.quizzes) {
      const total = totalQuestions(quiz);
      const correct = firstCorrectCount(quiz);
      const answered = answeredCount(quiz);
      const card = document.createElement('a');
      card.className = 'quiz-card';
      card.href = '#' + quiz.id;
      card.innerHTML = `
        <h3>${fmt(quiz.title)}</h3>
        ${quiz.description ? `<p>${fmt(quiz.description)}</p>` : ''}
        <div class="quiz-meta">
          <span>${total} questions · ${quiz.segments.length} segments</span>
          <span>${correct}/${total} correct on first try (${answered} attempted)</span>
        </div>
      `;
      list.appendChild(card);
    }
    wrap.appendChild(list);

    const footer = document.createElement('div');
    footer.className = 'home-footer';
    const resetAll = document.createElement('button');
    resetAll.className = 'secondary danger';
    resetAll.textContent = 'Reset all progress';
    resetAll.onclick = () => {
      if (!confirm('Reset progress on every quiz? This cannot be undone.')) return;
      Object.assign(state, emptyState());
      saveState();
      render();
    };
    footer.appendChild(resetAll);
    wrap.appendChild(footer);

    appEl.appendChild(wrap);
  }

  // ---- glossary page -----------------------------------------------------
  function renderGlossary(quiz) {
    const wrap = document.createElement('div');
    wrap.className = 'glossary';

    const intro = document.createElement('div');
    intro.className = 'quiz-intro';
    intro.innerHTML = `<h2>${fmt(quiz.title)} — glossary</h2><p>Concepts the quiz assumes. Jump to a section or skim the whole thing.</p>`;
    wrap.appendChild(intro);

    const toc = document.createElement('nav');
    toc.className = 'glossary-toc';
    quiz.glossary.forEach(entry => {
      const a = document.createElement('a');
      a.href = `#${quiz.id}/glossary`;
      a.innerHTML = fmt(entry.title);
      a.onclick = (e) => {
        e.preventDefault();
        document.getElementById('gl-' + entry.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      toc.appendChild(a);
    });
    wrap.appendChild(toc);

    quiz.glossary.forEach(entry => {
      const section = document.createElement('section');
      section.id = 'gl-' + entry.id;
      section.className = 'gl-entry';
      const h = document.createElement('h3');
      h.innerHTML = fmt(entry.title);
      section.appendChild(h);
      (entry.body || []).forEach(block => section.appendChild(renderGlossaryBlock(block)));
      wrap.appendChild(section);
    });

    const back = document.createElement('a');
    back.href = `#${quiz.id}`;
    back.className = 'gl-back';
    back.textContent = '← back to quiz';
    wrap.appendChild(back);

    appEl.appendChild(wrap);
  }

  function renderGlossaryBlock(b) {
    if (b.type === 'p') {
      const p = document.createElement('p');
      p.innerHTML = fmt(b.text);
      return p;
    }
    if (b.type === 'ul' || b.type === 'ol') {
      const el = document.createElement(b.type);
      for (const item of b.items) {
        const li = document.createElement('li');
        li.innerHTML = fmt(item);
        el.appendChild(li);
      }
      return el;
    }
    if (b.type === 'table') {
      const t = document.createElement('table');
      const thead = document.createElement('thead');
      const htr = document.createElement('tr');
      for (const h of b.headers) {
        const th = document.createElement('th');
        th.innerHTML = fmt(h);
        htr.appendChild(th);
      }
      thead.appendChild(htr);
      t.appendChild(thead);
      const tbody = document.createElement('tbody');
      for (const row of b.rows) {
        const tr = document.createElement('tr');
        for (const cell of row) {
          const td = document.createElement('td');
          td.innerHTML = fmt(cell);
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      t.appendChild(tbody);
      return t;
    }
    if (b.type === 'pre') {
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      code.textContent = b.text;
      pre.appendChild(code);
      return pre;
    }
    if (b.type === 'note') {
      const d = document.createElement('div');
      d.className = 'gl-note';
      d.innerHTML = fmt(b.text);
      return d;
    }
    const u = document.createElement('div');
    u.textContent = 'unknown block type: ' + b.type;
    return u;
  }

  // ---- quiz page ---------------------------------------------------------
  function renderQuiz(quiz) {
    const qs = quizState(quiz.id);

    const intro = document.createElement('div');
    intro.className = 'quiz-intro';
    intro.innerHTML = `
      <h2>${fmt(quiz.title)}</h2>
      ${quiz.description ? `<p>${fmt(quiz.description)}</p>` : ''}
    `;
    if (quiz.links?.length) {
      const links = document.createElement('div');
      links.className = 'quiz-links';
      links.innerHTML = '<span class="links-label">docs:</span>' +
        quiz.links.map(l => {
          const internal = l.url.startsWith('#');
          const tgt = internal ? '' : ' target="_blank" rel="noopener"';
          return `<a href="${esc(l.url)}"${tgt}>${fmt(l.title)}</a>`;
        }).join('');
      intro.appendChild(links);
    }
    appEl.appendChild(intro);

    const nav = document.createElement('nav');
    nav.className = 'segments';
    quiz.segments.forEach((seg, si) => {
      const btn = document.createElement('button');
      btn.innerHTML = `<span>${fmt(seg.title)}</span><span class="seg-score">${segmentFirstCorrect(quiz, seg)}/${seg.questions.length}</span>`;
      if (!qs.showSummary && qs.segIdx === si) btn.classList.add('active');
      btn.onclick = () => {
        qs.segIdx = si; qs.qIdx = 0; qs.showSummary = false;
        saveState(); render();
      };
      nav.appendChild(btn);
    });
    appEl.appendChild(nav);

    if (qs.showSummary) {
      renderSummary(quiz);
      return;
    }

    const seg = quiz.segments[qs.segIdx];
    const q = seg.questions[qs.qIdx];
    appEl.appendChild(renderQuestion(quiz, seg, q, qs.qIdx));

    const footer = document.createElement('div');
    footer.className = 'quiz-nav';
    const g = posToGlobal(quiz, qs.segIdx, qs.qIdx);
    const total = totalQuestions(quiz);

    const prevBtn = document.createElement('button');
    prevBtn.className = 'secondary';
    prevBtn.textContent = '← Prev';
    prevBtn.disabled = g === 0;
    prevBtn.onclick = () => navGlobal(quiz, g - 1);

    const nextBtn = document.createElement('button');
    nextBtn.className = 'secondary';
    nextBtn.textContent = g === total - 1 ? 'View summary' : 'Next →';
    nextBtn.onclick = () => {
      if (g === total - 1) { qs.showSummary = true; saveState(); render(); }
      else navGlobal(quiz, g + 1);
    };

    footer.appendChild(prevBtn);
    footer.appendChild(nextBtn);

    const spacer = document.createElement('div');
    spacer.className = 'spacer';
    footer.appendChild(spacer);

    const rsBtn = document.createElement('button');
    rsBtn.className = 'secondary danger';
    rsBtn.textContent = 'Reset segment';
    rsBtn.onclick = () => {
      if (!confirm(`Reset answers for "${seg.title}"?`)) return;
      for (const q2 of seg.questions) {
        delete qs.answers[q2.id];
        clearRenderCache(q2.id);
      }
      qs.qIdx = 0;
      saveState(); render();
    };
    const rqBtn = document.createElement('button');
    rqBtn.className = 'secondary danger';
    rqBtn.textContent = 'Reset quiz';
    rqBtn.onclick = () => {
      if (!confirm(`Reset all progress for "${quiz.title}"?`)) return;
      for (const s of quiz.segments) for (const q2 of s.questions) clearRenderCache(q2.id);
      delete state.quizzes[quiz.id];
      saveState(); render();
    };
    footer.appendChild(rsBtn);
    footer.appendChild(rqBtn);

    appEl.appendChild(footer);
  }

  function navGlobal(quiz, g) {
    const qs = quizState(quiz.id);
    const { segIdx, qIdx } = globalToPos(quiz, g);
    qs.segIdx = segIdx; qs.qIdx = qIdx; qs.showSummary = false;
    saveState(); render();
  }
  function navToQuestion(quiz, segIdx, qIdx) {
    const qs = quizState(quiz.id);
    qs.segIdx = segIdx; qs.qIdx = qIdx; qs.showSummary = false;
    saveState(); render();
  }

  // ---- summary -----------------------------------------------------------
  function renderSummary(quiz) {
    const total = totalQuestions(quiz);
    const correct = firstCorrectCount(quiz);
    const answered = answeredCount(quiz);
    const missed = missedQuestions(quiz);

    const card = document.createElement('section');
    card.className = 'q-card';
    card.innerHTML = `
      <div class="q-head"><span>${fmt(quiz.title)} — summary</span><span>${answered}/${total} attempted</span></div>
      <h2 class="q-prompt">${correct} / ${total} correct on first try</h2>
      <div class="q-hint">${missed.length === 0 ? (answered === total ? 'All clear — nothing missed.' : 'Nothing missed among attempted questions.') : 'Missed questions — click to revisit:'}</div>
    `;
    if (missed.length) {
      const list = document.createElement('ul');
      list.className = 'missed-list';
      for (const m of missed) {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.innerHTML = `${fmt(m.seg.title)} — ${fmt(m.q.prompt)}`;
        a.onclick = (ev) => { ev.preventDefault(); navToQuestion(quiz, m.segIdx, m.qIdx); };
        li.appendChild(a);
        list.appendChild(li);
      }
      card.appendChild(list);
    }
    const actions = document.createElement('div');
    actions.className = 'actions';
    const back = document.createElement('button');
    back.className = 'secondary';
    back.textContent = 'Back to quiz';
    back.onclick = () => { const qs = quizState(quiz.id); qs.showSummary = false; saveState(); render(); };
    const home = document.createElement('button');
    home.className = 'secondary';
    home.textContent = 'Home';
    home.onclick = goHome;
    actions.appendChild(back);
    actions.appendChild(home);
    card.appendChild(actions);
    appEl.appendChild(card);
  }

  // ---- question dispatch -------------------------------------------------
  function renderQuestion(quiz, seg, q, qIdx) {
    const card = document.createElement('section');
    card.className = 'q-card';

    const qs = quizState(quiz.id);
    const a = qs.answers[q.id];
    const status = !a ? 'unanswered' : (a.firstCorrect ? 'correct on first try' : (a.lastCorrect ? 'correct' : 'keep trying'));

    const head = document.createElement('div');
    head.className = 'q-head';
    head.innerHTML = `<span>${fmt(seg.title)} · question ${qIdx + 1} / ${seg.questions.length}</span><span>${esc(status)}</span>`;
    card.appendChild(head);

    const prompt = document.createElement('h2');
    prompt.className = 'q-prompt';
    prompt.innerHTML = fmt(q.prompt);
    card.appendChild(prompt);

    if (q.hint) {
      const hint = document.createElement('div');
      hint.className = 'q-hint';
      hint.innerHTML = fmt(q.hint);
      card.appendChild(hint);
    }

    const body = document.createElement('div');
    card.appendChild(body);

    const renderer = QUESTION_RENDERERS[q.type];
    if (renderer) renderer(quiz, q, body);
    else body.textContent = 'Unknown question type: ' + q.type;

    return card;
  }

  // ---- answer helpers ----------------------------------------------------
  function setAnswer(quizId, qid, result) {
    const qs = quizState(quizId);
    const prev = qs.answers[qid];
    qs.answers[qid] = {
      ...result,
      firstCorrect: prev && prev.firstCorrect !== undefined ? prev.firstCorrect : result.lastCorrect,
    };
    saveState();
  }
  function retryAnswer(quizId, qid) {
    const qs = quizState(quizId);
    const prev = qs.answers[qid];
    qs.answers[qid] = { firstCorrect: prev?.firstCorrect, submitted: false };
    saveState();
    clearRenderCache(qid);
  }

  // ---- single/multi ------------------------------------------------------
  function renderChoice(quiz, q, body) {
    const qs = quizState(quiz.id);
    const prev = qs.answers[q.id];
    const submitted = prev?.submitted === true;
    const multi = q.type === 'multi';
    const selected = new Set(prev?.selected ?? []);
    const order = getOptionOrder(q);
    const options = order.map(id => q.options.find(o => o.id === id));

    const form = document.createElement('form');
    form.className = 'options';
    form.onsubmit = (e) => e.preventDefault();

    for (const opt of options) {
      const row = document.createElement('label');
      row.className = 'option';
      const input = document.createElement('input');
      input.type = multi ? 'checkbox' : 'radio';
      input.name = q.id;
      input.value = opt.id;
      input.checked = selected.has(opt.id);
      input.disabled = submitted;
      input.onchange = () => {
        if (multi) { if (input.checked) selected.add(opt.id); else selected.delete(opt.id); }
        else { selected.clear(); selected.add(opt.id); }
      };
      row.appendChild(input);
      const text = document.createElement('div');
      const title = document.createElement('div');
      title.innerHTML = fmt(opt.text);
      text.appendChild(title);
      const ex = document.createElement('div');
      ex.className = 'explain';
      ex.innerHTML = `<strong>${opt.correct ? 'Why right:' : 'Why wrong:'}</strong> ${fmt(opt.explain)}`;
      text.appendChild(ex);
      row.appendChild(text);
      form.appendChild(row);

      if (submitted) {
        const was = selected.has(opt.id);
        if (was && opt.correct) row.classList.add('correct');
        else if (was && !opt.correct) row.classList.add('wrong');
        else if (!was && opt.correct) row.classList.add('correct');
      }
    }
    body.appendChild(form);

    const actions = document.createElement('div');
    actions.className = 'actions';
    const submit = document.createElement('button');
    submit.className = 'primary';
    submit.textContent = submitted ? 'Try again' : 'Check';
    submit.onclick = () => {
      if (submitted) { retryAnswer(quiz.id, q.id); render(); return; }
      if (selected.size === 0) return;
      const correctSet = new Set(q.options.filter(o => o.correct).map(o => o.id));
      const chosen = [...selected];
      const isCorrect = multi
        ? (chosen.length === correctSet.size && chosen.every(id => correctSet.has(id)))
        : correctSet.has(chosen[0]);
      setAnswer(quiz.id, q.id, { selected: chosen, submitted: true, lastCorrect: isCorrect });
      render();
    };
    actions.appendChild(submit);
    if (submitted) {
      const v = document.createElement('span');
      v.className = 'verdict ' + (prev.lastCorrect ? 'good' : 'bad');
      v.textContent = prev.lastCorrect ? 'Correct' : 'Not quite';
      actions.appendChild(v);
    }
    body.appendChild(actions);
  }

  // ---- drag & drop helpers ----------------------------------------------
  let selectedChip = null;
  function makeChip(item, onRemove) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.draggable = true;
    chip.tabIndex = 0;
    chip.dataset.itemId = item.id;
    chip.innerHTML = fmt(item.label);
    chip.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', item.id);
      e.dataTransfer.effectAllowed = 'move';
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    chip.addEventListener('click', () => {
      if (selectedChip && selectedChip !== chip) selectedChip.classList.remove('selected');
      if (selectedChip === chip) { chip.classList.remove('selected'); selectedChip = null; }
      else { selectedChip = chip; chip.classList.add('selected'); }
    });
    chip.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); chip.click(); }
      else if (e.key === 'Backspace' && onRemove) { e.preventDefault(); onRemove(); }
    });
    return chip;
  }
  function attachDropZone(zone, onDrop) {
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('over');
      const id = e.dataTransfer.getData('text/plain');
      if (id) onDrop(id);
    });
    zone.addEventListener('click', () => {
      if (selectedChip) {
        const id = selectedChip.dataset.itemId;
        selectedChip.classList.remove('selected');
        selectedChip = null;
        onDrop(id);
      }
    });
  }

  // ---- map ---------------------------------------------------------------
  function renderMap(quiz, q, body) {
    const qs = quizState(quiz.id);
    const prev = qs.answers[q.id];
    const submitted = prev?.submitted === true;
    const placements = { ...(prev?.placements ?? {}) };
    const order = getPaletteOrder(q, q.items.map(i => i.id));

    const wrap = document.createElement('div');
    wrap.className = 'dnd-wrap';
    const palette = document.createElement('div');
    palette.className = 'palette';
    const targetsEl = document.createElement('div');
    targetsEl.className = 'targets';

    function redraw() {
      palette.innerHTML = '';
      targetsEl.innerHTML = '';
      const targetById = new Map();
      for (const t of q.targets) {
        const col = document.createElement('div');
        col.className = 'target';
        const h = document.createElement('h4');
        h.innerHTML = fmt(t.label);
        col.appendChild(h);
        const slot = document.createElement('div');
        slot.className = 'slot';
        col.appendChild(slot);
        targetsEl.appendChild(col);
        targetById.set(t.id, slot);
        if (!submitted) attachDropZone(slot, (id) => { placements[id] = t.id; redraw(); });
      }
      for (const id of order) {
        const item = q.items.find(i => i.id === id);
        if (placements[item.id]) continue;
        const chip = makeChip(item);
        if (submitted) chip.draggable = false;
        palette.appendChild(chip);
      }
      for (const item of q.items) {
        const tid = placements[item.id];
        if (!tid) continue;
        const slot = targetById.get(tid);
        if (!slot) continue;
        const chip = makeChip(item, () => { delete placements[item.id]; redraw(); });
        if (submitted) {
          chip.draggable = false;
          chip.classList.add(tid === item.target ? 'correct' : 'wrong');
        } else {
          chip.addEventListener('dblclick', () => { delete placements[item.id]; redraw(); });
        }
        slot.appendChild(chip);
      }
      if (!submitted) attachDropZone(palette, (id) => { delete placements[id]; redraw(); });
    }
    redraw();
    wrap.appendChild(palette);
    wrap.appendChild(targetsEl);
    body.appendChild(wrap);

    const actions = document.createElement('div');
    actions.className = 'actions';
    const submit = document.createElement('button');
    submit.className = 'primary';
    submit.textContent = submitted ? 'Try again' : 'Check';
    submit.onclick = () => {
      if (submitted) { retryAnswer(quiz.id, q.id); render(); return; }
      if (q.items.some(i => !placements[i.id])) {
        submit.textContent = 'Place all items first';
        setTimeout(() => submit.textContent = 'Check', 1200);
        return;
      }
      const allCorrect = q.items.every(i => placements[i.id] === i.target);
      setAnswer(quiz.id, q.id, { placements, submitted: true, lastCorrect: allCorrect });
      render();
    };
    actions.appendChild(submit);
    if (submitted) {
      const v = document.createElement('span');
      v.className = 'verdict ' + (prev.lastCorrect ? 'good' : 'bad');
      v.textContent = prev.lastCorrect ? 'All correct' : 'Some off — see below';
      actions.appendChild(v);
    }
    body.appendChild(actions);

    if (submitted) {
      const list = document.createElement('div');
      list.className = 'explain-list';
      const ul = document.createElement('ul');
      for (const item of q.items) {
        const placed = placements[item.id];
        const right = placed === item.target;
        const li = document.createElement('li');
        li.className = right ? 'good' : 'bad';
        const target = q.targets.find(t => t.id === item.target);
        if (right) {
          li.innerHTML = `<strong>${fmt(item.label)}</strong> → ${fmt(target.label)}. ${fmt(item.explain)}`;
        } else {
          const wrongT = q.targets.find(t => t.id === placed);
          li.innerHTML = `<strong>${fmt(item.label)}</strong> belongs on <em>${fmt(target.label)}</em> (you placed it on <em>${fmt(wrongT?.label ?? 'nowhere')}</em>). ${fmt(item.explain)}`;
        }
        ul.appendChild(li);
      }
      list.appendChild(ul);
      body.appendChild(list);
    }
  }

  // ---- order -------------------------------------------------------------
  function renderOrder(quiz, q, body) {
    const qs = quizState(quiz.id);
    const prev = qs.answers[q.id];
    const submitted = prev?.submitted === true;
    const n = q.steps.length;
    const placements = Array.isArray(prev?.placements) && prev.placements.length === n
      ? prev.placements.slice()
      : new Array(n).fill(null);
    const order = getPaletteOrder(q, q.steps.map(s => s.id));

    const wrap = document.createElement('div');
    wrap.className = 'dnd-wrap';
    const palette = document.createElement('div');
    palette.className = 'palette';
    const list = document.createElement('div');
    list.className = 'order-list';

    function redraw() {
      palette.innerHTML = '';
      list.innerHTML = '';
      const placedIds = new Set(placements.filter(Boolean));
      for (const id of order) {
        if (placedIds.has(id)) continue;
        const step = q.steps.find(s => s.id === id);
        const chip = makeChip(step);
        if (submitted) chip.draggable = false;
        palette.appendChild(chip);
      }
      if (!submitted) attachDropZone(palette, (id) => {
        const idx = placements.indexOf(id);
        if (idx !== -1) placements[idx] = null;
        redraw();
      });
      for (let i = 0; i < n; i++) {
        const slotRow = document.createElement('div');
        slotRow.className = 'order-slot';
        const idx = document.createElement('div');
        idx.className = 'idx';
        idx.textContent = String(i + 1);
        slotRow.appendChild(idx);
        const drop = document.createElement('div');
        drop.className = 'drop';
        slotRow.appendChild(drop);
        const placedId = placements[i];
        if (placedId) {
          const step = q.steps.find(s => s.id === placedId);
          const chip = makeChip(step, () => { placements[i] = null; redraw(); });
          if (submitted) {
            chip.draggable = false;
            chip.classList.add(placedId === q.steps[i].id ? 'correct' : 'wrong');
          }
          drop.appendChild(chip);
        }
        if (!submitted) attachDropZone(slotRow, (id) => {
          const from = placements.indexOf(id);
          const wasInSlot = placements[i];
          if (from !== -1) placements[from] = wasInSlot ?? null;
          placements[i] = id;
          redraw();
        });
        list.appendChild(slotRow);
      }
    }
    redraw();
    wrap.appendChild(palette);
    wrap.appendChild(list);
    body.appendChild(wrap);

    const actions = document.createElement('div');
    actions.className = 'actions';
    const submit = document.createElement('button');
    submit.className = 'primary';
    submit.textContent = submitted ? 'Try again' : 'Check';
    submit.onclick = () => {
      if (submitted) { retryAnswer(quiz.id, q.id); render(); return; }
      if (placements.some(p => !p)) {
        submit.textContent = 'Fill every slot first';
        setTimeout(() => submit.textContent = 'Check', 1200);
        return;
      }
      const allCorrect = placements.every((id, i) => id === q.steps[i].id);
      setAnswer(quiz.id, q.id, { placements, submitted: true, lastCorrect: allCorrect });
      render();
    };
    actions.appendChild(submit);
    if (submitted) {
      const v = document.createElement('span');
      v.className = 'verdict ' + (prev.lastCorrect ? 'good' : 'bad');
      v.textContent = prev.lastCorrect ? 'All in order' : 'Order off — see below';
      actions.appendChild(v);
    }
    body.appendChild(actions);

    if (submitted) {
      const listEl = document.createElement('div');
      listEl.className = 'explain-list';
      const ul = document.createElement('ul');
      for (let i = 0; i < n; i++) {
        const expected = q.steps[i];
        const placedId = placements[i];
        const right = placedId === expected.id;
        const li = document.createElement('li');
        li.className = right ? 'good' : 'bad';
        if (right) {
          li.innerHTML = `<strong>${i + 1}. ${fmt(expected.label)}</strong> — ${fmt(expected.explain)}`;
        } else {
          const placedStep = q.steps.find(s => s.id === placedId);
          li.innerHTML = `<strong>Slot ${i + 1} should be:</strong> ${fmt(expected.label)}. (You had: <em>${fmt(placedStep?.label ?? '—')}</em>.) ${fmt(expected.explain)}`;
        }
        ul.appendChild(li);
      }
      listEl.appendChild(ul);
      body.appendChild(listEl);
    }
  }

  // ---- dispatch table ----------------------------------------------------
  const QUESTION_RENDERERS = {
    single: renderChoice,
    multi: renderChoice,
    map: renderMap,
    order: renderOrder,
  };

  // ---- keyboard ----------------------------------------------------------
  function handleKeys(e) {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const route = currentRoute();
    if (route.kind !== 'quiz') return;
    const qs = quizState(route.quiz.id);
    if (qs.showSummary) return;
    const g = posToGlobal(route.quiz, qs.segIdx, qs.qIdx);
    const total = totalQuestions(route.quiz);
    if (e.key === 'ArrowLeft' || e.key === 'h') {
      if (g > 0) { e.preventDefault(); navGlobal(route.quiz, g - 1); }
    } else if (e.key === 'ArrowRight' || e.key === 'l') {
      if (g < total - 1) { e.preventDefault(); navGlobal(route.quiz, g + 1); }
    }
  }

  // ---- init --------------------------------------------------------------
  window.addEventListener('hashchange', render);
  window.addEventListener('keydown', handleKeys);
  render();
})();
</script>
</body>
</html>
